name: CI

# Quality gate for the Advisor-e Collaborate repo. Runs on every push to main and
# every pull request targeting main. The job mirrors the local pre-commit gate
# (lint + tests) and additionally proves the production build, on the LOCKED
# runtime Node 14.15 (CLAUDE.md Stack Constitution, req. 9).
#
# Branch protection on `main` should REQUIRE the "verify" job below before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  verify:
    name: Lint, test & build (Node 14.15)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 14.15 (locked runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '14.15.0'
          cache: npm

      - name: Install dependencies (clean, from lockfile)
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint docs (markdownlint)
        run: npm run lint:md

      - name: Unit tests (Jest)
        run: npm test

      - name: Dependency-audit gate (critical, allow-listed build-time risk)
        run: npm run audit:gate

      - name: Production build (nuxt build)
        run: npm run build

  e2e:
    name: E2E journeys (Playwright, Node 14.15)
    # ubuntu-22.04 matches the Playwright 1.34 line (the last that supports the
    # locked Node 14.15); its system-dep list installs cleanly there.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 14.15 (locked runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '14.15.0'
          cache: npm

      - name: Install dependencies (clean, from lockfile)
        run: npm ci

      - name: Install Playwright Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run e2e journeys (Playwright boots the app via dev:all)
        run: npm run test:e2e
        env:
          CI: 'true'
